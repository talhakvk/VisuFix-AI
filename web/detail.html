<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="VisuFix AI — Arıza detayı, yapay zeka tarafından üretilen tamir adımları." />
  <title>VisuFix AI — Arıza Detayı</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    };
  </script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dark">

<!-- ══════════════════════════════════════════════
     SIDEBAR OVERLAY (mobile)
══════════════════════════════════════════════ -->
<div class="sidebar-overlay hidden" id="sidebarOverlay" aria-hidden="true"></div>

<!-- ══════════════════════════════════════════════
     APP LAYOUT
══════════════════════════════════════════════ -->
<div class="app-layout">

  <!-- ── Sidebar ──────────────────────────────── -->
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Ana navigasyon">

    <div class="sidebar-logo">
      <div class="logo-dot" aria-hidden="true"></div>
      <span class="logo-text">VisuFix AI</span>
    </div>
    <div class="logo-subtitle">Admin Panel</div>

    <div class="sidebar-divider"></div>

    <nav class="sidebar-nav">
      <div class="nav-label">Menü</div>

      <a href="index.html" class="nav-link" id="nav-dashboard">
        <span class="nav-icon" aria-hidden="true">⬡</span>
        Dashboard
      </a>

      <a href="index.html" class="nav-link" id="nav-faults">
        <span class="nav-icon" aria-hidden="true">📋</span>
        Arızalar
      </a>

      <button class="nav-link" id="nav-settings" onclick="showSettingsToast()">
        <span class="nav-icon" aria-hidden="true">⚙️</span>
        Ayarlar
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="text-xs" style="color:var(--text-secondary)">v1.0.0</div>
      <div class="text-xs mt-1" style="color:var(--border)">© 2026 VisuFix AI</div>
    </div>
  </aside>

  <!-- ── Main Content ──────────────────────────── -->
  <div class="main-content">

    <!-- Top Header -->
    <header class="top-header">
      <div class="flex items-center gap-3">
        <button class="hamburger" id="hamburgerBtn" aria-label="Menüyü aç/kapat" aria-expanded="false">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="header-title" id="headerTitle">Arıza Detayı</h1>
      </div>

      <div class="header-meta">
        <span class="header-time" id="headerTime" aria-live="polite"></span>
      </div>
    </header>

    <!-- Page Body -->
    <main class="page-body" id="main">

      <!-- İçerik JS tarafından doldurulur -->
      <div id="pageContent">
        <!-- Loading skeleton -->
        <div class="detail-layout" id="loadingSkeleton">
          <div style="height:20px;width:200px;background:var(--bg-card);border-radius:6px;margin-bottom:12px;"></div>
          <div style="height:14px;width:100px;background:var(--bg-card);border-radius:6px;margin-bottom:28px;"></div>
          <div class="detail-grid">
            <div style="background:var(--bg-card);border-radius:14px;height:400px;border:1px solid var(--border);"></div>
            <div style="background:var(--bg-card);border-radius:14px;height:400px;border:1px solid var(--border);"></div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

<!-- JS -->
<script src="js/api.js"></script>
<script src="js/detail.js"></script>
</body>
</html>
